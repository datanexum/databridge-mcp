apiVersion: apps/v1
kind: Deployment
metadata:
  name: databridge-mcp
  namespace: databridge
  labels:
    app: databridge-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: databridge-mcp
  template:
    metadata:
      labels:
        app: databridge-mcp
    spec:
      containers:
        - name: mcp
          image: ghcr.io/datanexum/databridge-mcp:latest
          ports:
            - containerPort: 786
            - containerPort: 8000  # Prometheus metrics
          envFrom:
            - configMapRef:
                name: databridge-config
            - secretRef:
                name: databridge-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 786
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 786
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: databridge-data
---
apiVersion: v1
kind: Service
metadata:
  name: databridge-mcp
  namespace: databridge
spec:
  selector:
    app: databridge-mcp
  ports:
    - name: mcp
      port: 786
      targetPort: 786
    - name: metrics
      port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: databridge-mcp-hpa
  namespace: databridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: databridge-mcp
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
