apiVersion: apps/v1
kind: Deployment
metadata:
  name: databridge-dashboard
  namespace: databridge
  labels:
    app: databridge-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: databridge-dashboard
  template:
    metadata:
      labels:
        app: databridge-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/datanexum/databridge-ai:latest
          ports:
            - containerPort: 5050
          envFrom:
            - configMapRef:
                name: databridge-config
            - secretRef:
                name: databridge-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5050
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: databridge-dashboard
  namespace: databridge
spec:
  selector:
    app: databridge-dashboard
  ports:
    - port: 5050
      targetPort: 5050
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: databridge-dashboard-hpa
  namespace: databridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: databridge-dashboard
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
