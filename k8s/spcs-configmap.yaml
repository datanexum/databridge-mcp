apiVersion: v1
kind: ConfigMap
metadata:
  name: databridge-spcs-config
  namespace: databridge
  labels:
    app: databridge
    overlay: spcs
data:
  DEPLOYMENT_MODE: "spcs"
  LLM_PROVIDER: "cortex"
  PERSISTENCE_BACKEND: "snowflake"
  SNOWFLAKE_TOKEN_PATH: "/snowflake/session/token"
  # Override these per-client:
  # SNOWFLAKE_ACCOUNT: ""
  # SNOWFLAKE_DATABASE: ""
  # SNOWFLAKE_SCHEMA: ""
  # SNOWFLAKE_WAREHOUSE: ""
  # SPCS_EVENT_TABLE: ""
  # CORTEX_DEFAULT_MODEL: "mistral-large"
  # CORTEX_RATE_LIMIT_RPM: "60"
