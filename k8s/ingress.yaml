apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: databridge-ingress
  namespace: databridge
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: databridge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: databridge-dashboard
                port:
                  number: 5050
    - host: mcp.databridge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: databridge-mcp
                port:
                  number: 786
