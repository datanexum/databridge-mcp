apiVersion: v1
kind: ConfigMap
metadata:
  name: databridge-config
  namespace: databridge
data:
  DATABRIDGE_TOOL_MODE: "full"
  DATABRIDGE_USE_MCP_HTTP: "true"
  DATABRIDGE_MCP_URL: "http://databridge-mcp:786"
  REDIS_URL: "redis://redis:6379"
  TASK_QUEUE_BACKEND: "celery"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"
  PERSISTENCE_BACKEND: "postgres"
  STORAGE_BACKEND: "s3"
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "databridge"
  QDRANT_URL: "http://qdrant:6333"
  DATABRIDGE_API_AUTH_ENABLED: "true"
  DATABRIDGE_LICENSE_SERVER_URL: ""
  API_KEY_STORAGE: "postgres"
  PYTHONUNBUFFERED: "1"
