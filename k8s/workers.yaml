# General Worker — normal + critical queues
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-general
  namespace: databridge
  labels:
    app: worker-general
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-general
  template:
    metadata:
      labels:
        app: worker-general
    spec:
      containers:
        - name: worker
          image: ghcr.io/datanexum/databridge-mcp:latest
          command: ["celery", "-A", "src.task_queue.celery_app", "worker"]
          args: ["--queues=normal,critical", "--concurrency=4", "--pool=threads", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: databridge-config
            - secretRef:
                name: databridge-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
---
# LLM Worker — llm queue (lower concurrency due to API rate limits)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-llm
  namespace: databridge
  labels:
    app: worker-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-llm
  template:
    metadata:
      labels:
        app: worker-llm
    spec:
      containers:
        - name: worker
          image: ghcr.io/datanexum/databridge-mcp:latest
          command: ["celery", "-A", "src.task_queue.celery_app", "worker"]
          args: ["--queues=llm", "--concurrency=2", "--pool=threads", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: databridge-config
            - secretRef:
                name: databridge-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
# CPU Worker — cpu queue (prefork for CPU-bound tasks)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-cpu
  namespace: databridge
  labels:
    app: worker-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-cpu
  template:
    metadata:
      labels:
        app: worker-cpu
    spec:
      containers:
        - name: worker
          image: ghcr.io/datanexum/databridge-mcp:latest
          command: ["celery", "-A", "src.task_queue.celery_app", "worker"]
          args: ["--queues=cpu", "--concurrency=2", "--pool=prefork", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: databridge-config
            - secretRef:
                name: databridge-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
