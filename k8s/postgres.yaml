apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: databridge
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: databridge
            - name: POSTGRES_USER
              value: databridge
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: databridge-secrets
                  key: POSTGRES_URL
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "databridge"]
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: databridge
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
